server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true    # 強制所有 HTTP 請求與回應使用 UTF-8

spring:
  datasource:
    url: jdbc:h2:mem:bomdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      mode: always
      encoding: UTF-8      # 確保 SQL 初始化腳本以 UTF-8 讀取，避免 Windows JVM 預設 cp1252 造成中文亂碼
  cache:
    type: caffeine
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Taipei

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

logging:
  level:
    com.delta.bom: DEBUG
