server:
  port: 8095
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true    # 強制所有 HTTP 請求與回應使用 UTF-8

spring:
  datasource:
    url: jdbc:h2:file:./data/bomdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      mode: always
      encoding: UTF-8      # 確保 SQL 初始化腳本以 UTF-8 讀取，避免 Windows JVM 預設 cp1252 造成中文亂碼
  cache:
    type: caffeine
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Taipei

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

logging:
  level:
    com.delta.bom: DEBUG
  charset:
    console: UTF-8
    file: UTF-8   # 避免 Windows JVM 預設非 UTF-8 編碼，導致 log 檔案裡的中文變亂碼
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB      # 單一檔案超過大小就輪替
      max-history: 30          # 最多保留 30 天的歷史檔案
      total-size-cap: 500MB    # 所有歷史檔案加總上限，超過會刪除最舊的
